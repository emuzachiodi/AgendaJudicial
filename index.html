            { id: '303', name: 'Dra. Mónica Carmona', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '308' },
            { id: '304', name: 'Dra. María Elizabeth Bordin', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '226' },
            { id: '305', name: 'Dr. Franco Bongiovanni', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '119' },
            { id: '306', name: 'Dr. Facundo Etienot', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '117' },
            { id: '307', name: 'Dra. Fernanda Ruffatti', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '118' },
            { id: '308', name: 'Dra. Agustina Pietranera', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '107' },
            { id: '309', name: 'Mesa de Entrada', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '101' },
            { id: '310', name: 'Administrativo', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '103' },
            { id: '311', name: 'Sala de Reuniones', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '124' },
            { id: '312', name: 'Dra. Eugenia Shmith', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '121' },
            { id: '313', name: 'Dr. Bruno Gambino', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '122' },
            { id: '314', name: 'Dr. Leandro Dato', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '123' },
            { id: '315', name: 'Dra. Elisabet Comas', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '120' },
            { id: '316', name: 'Dra. Debora Zari', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '108' },
            { id: '317', name: 'Mesa de Entrada (2)', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '102' },
            { id: '318', name: 'Administrativo (2)', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '105' },
            { id: '319', name: 'Contadores MPF (Quevedo/Butta)', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '4209671 – Int 35/48' },
            { id: '320', name: 'Delitos Complejos', department: 'Unidad Fiscal', category: 'Unidad Fiscal', phone: '155096144' },
            { id: '321', name: 'Mesa de Entrada MPF', department: 'Mariano Roca Nazar', category: 'Unidad Fiscal', phone: '343 4 612 121' },
        ];

        function App() {
            // Cargar datos guardados si existen, sino usar los iniciales
            const [contacts, setContacts] = useState(() => {
                const saved = localStorage.getItem('agenda-judicial-datos');
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) { return initialContacts; }
                }
                return initialContacts;
            });
            
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Todas');
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [currentContact, setCurrentContact] = useState(null);
            const [formData, setFormData] = useState({ name: '', department: '', phone: '', category: '' });
            
            const [contactToDelete, setContactToDelete] = useState(null);

            // Guardar automáticamente cada vez que los contactos cambian
            useEffect(() => {
                localStorage.setItem('agenda-judicial-datos', JSON.stringify(contacts));
            }, [contacts]);

            const categories = useMemo(() => {
                const uniqueCategories = [...new Set(contacts.map(c => c.category).filter(Boolean))];
                return uniqueCategories.sort();
            }, [contacts]);

            const filteredContacts = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return contacts.filter(contact => {
                    const matchesSearch = 
                        contact.name.toLowerCase().includes(term) ||
                        contact.department.toLowerCase().includes(term) ||
                        contact.phone.toLowerCase().includes(term);
                    
                    const matchesCategory = selectedCategory === 'Todas' || contact.category === selectedCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [contacts, searchTerm, selectedCategory]);

            const handleOpenModal = (contact = null) => {
                if (contact) {
                    setCurrentContact(contact);
                    setFormData({ ...contact });
                } else {
                    setCurrentContact(null);
                    setFormData({ name: '', department: '', phone: '', category: categories[0] || '' });
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setCurrentContact(null);
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (currentContact) {
                    setContacts(contacts.map(c => c.id === currentContact.id ? { ...formData, id: c.id } : c));
                } else {
                    const newContact = { ...formData, id: Date.now().toString() };
                    setContacts([newContact, ...contacts]); // Agregar al principio
                }
                handleCloseModal();
            };

            const handleDelete = (contact) => {
                setContactToDelete(contact);
            };

            const confirmDelete = () => {
                if (contactToDelete) {
                    setContacts(contacts.filter(c => c.id !== contactToDelete.id));
                    setContactToDelete(null);
                }
            };

            // Para que en celular al hacer click en un teléfono se abra la app de llamadas
            const handleCall = (phone) => {
                // Si son números internos cortos, no hace la llamada directa, pero si es largo, sí.
                // Aquí simplemente quitamos letras o espacios para formar el link 'tel:'
                const cleanPhone = phone.replace(/[^\d+]/g, '');
                if(cleanPhone.length > 3) {
                   window.location.href = `tel:${cleanPhone}`;
                }
            };

            return (
                <div className="min-h-screen pb-10">
                    {/* Header optimizado para celular */}
                    <header className="bg-sky-800 text-white shadow-md sticky top-0 z-10">
                        <div className="px-4 py-4 sm:py-6 max-w-6xl mx-auto">
                            <h1 className="text-xl sm:text-2xl md:text-3xl font-bold flex items-center gap-2 sm:gap-3">
                                <IconBuilding className="w-6 h-6 sm:w-8 sm:h-8" />
                                <span className="truncate">Agenda Judicial</span>
                            </h1>
                            <p className="mt-1 text-xs sm:text-sm text-sky-100 opacity-90 truncate">
                                Provincia de Entre Ríos ({contacts.length} internos)
                            </p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-4 sm:py-8">
                        {/* Controles de Búsqueda y Añadir */}
                        <div className="flex flex-col gap-3 mb-6">
                            
                            {/* Búsqueda */}
                            <div className="relative w-full shadow-sm">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <IconSearch className="h-5 w-5 text-gray-400" />
                                </div>
                                <input
                                    type="text"
                                    className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sky-500 text-base"
                                    placeholder="Buscar nombre, área o interno..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            
                            <div className="flex gap-2">
                                {/* Filtro Categoría */}
                                <div className="relative w-2/3 shadow-sm">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <IconFilter className="h-5 w-5 text-gray-400" />
                                    </div>
                                    <select
                                        className="block w-full pl-10 pr-8 py-3 border border-gray-300 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-sky-500 appearance-none text-base"
                                        value={selectedCategory}
                                        onChange={(e) => setSelectedCategory(e.target.value)}
                                    >
                                        <option value="Todas">Todas las áreas</option>
                                        {categories.map((cat, idx) => (
                                            <option key={idx} value={cat}>{cat}</option>
                                        ))}
                                    </select>
                                </div>

                                {/* Botón Nuevo */}
                                <button
                                    onClick={() => handleOpenModal()}
                                    className="w-1/3 flex items-center justify-center gap-1 bg-sky-600 hover:bg-sky-700 text-white rounded-lg shadow-sm font-medium transition-colors text-sm"
                                >
                                    <IconPlus className="w-5 h-5" />
                                    <span className="hidden sm:inline">Nuevo</span>
                                </button>
                            </div>
                        </div>

                        {/* Lista de Contactos (Estilo Tarjeta para Móvil) */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredContacts.length > 0 ? (
                                filteredContacts.map((contact) => (
                                    <div key={contact.id} className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex flex-col gap-3">
                                        <div className="flex justify-between items-start">
                                            <div className="flex gap-3 items-center">
                                                <div className="h-10 w-10 bg-sky-100 rounded-full flex items-center justify-center text-sky-600 flex-shrink-0">
                                                    <IconUser className="w-5 h-5" />
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-gray-900 leading-tight">{contact.name}</h3>
                                                    <div className="text-xs text-gray-500 mt-0.5">{contact.department}</div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex justify-between items-end mt-2 pt-3 border-t border-gray-100">
                                            <div className="flex flex-col gap-2 items-start">
                                                <span className="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-600 border border-gray-200">
                                                    <IconTag className="w-3 h-3" /> {contact.category}
                                                </span>
                                                <button 
                                                    onClick={() => handleCall(contact.phone)}
                                                    className="px-3 py-1.5 flex text-sm font-bold rounded-lg bg-green-100 text-green-800 items-center gap-2 active:bg-green-200 transition-colors"
                                                >
                                                    <IconPhone className="w-4 h-4" /> {contact.phone}
                                                </button>
                                            </div>
                                            
                                            <div className="flex gap-1">
                                                <button onClick={() => handleOpenModal(contact)} className="p-2 text-sky-600 bg-sky-50 rounded-lg active:bg-sky-100" title="Editar">
                                                    <IconEdit className="w-4 h-4" />
                                                </button>
                                                <button onClick={() => handleDelete(contact)} className="p-2 text-red-500 bg-red-50 rounded-lg active:bg-red-100" title="Eliminar">
                                                    <IconTrash className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="col-span-full py-12 text-center text-gray-500 bg-white rounded-xl border border-gray-200">
                                    <div className="flex flex-col items-center justify-center">
                                        <IconSearch className="w-10 h-10 text-gray-300 mb-3" />
                                        <p className="text-lg font-medium">No se encontraron resultados</p>
                                        <p className="text-sm mt-1">Intenta ajustando el filtro.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal Crear/Editar */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-gray-900 bg-opacity-50 p-4">
                            <div className="bg-white rounded-xl w-full max-w-md overflow-hidden shadow-2xl animate-[translate-y_0.2s_ease-out]">
                                <div className="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-gray-900">
                                        {currentContact ? 'Editar Contacto' : 'Nuevo Contacto'}
                                    </h3>
                                    <button onClick={handleCloseModal} className="text-gray-400 p-1 rounded-full hover:bg-gray-100">
                                        <IconX className="w-6 h-6" />
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-5">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Nombre / Titular</label>
                                            <input type="text" name="name" required className="w-full px-3 py-2 border border-gray-300 rounded-lg text-base focus:ring-2 focus:ring-sky-500 outline-none" placeholder="Ej. Dr. Pérez, Juan" value={formData.name} onChange={handleChange} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                                            <input type="text" list="category-options" name="category" required className="w-full px-3 py-2 border border-gray-300 rounded-lg text-base focus:ring-2 focus:ring-sky-500 outline-none" placeholder="Elige o escribe una nueva" value={formData.category} onChange={handleChange} />
                                            <datalist id="category-options">
                                                {categories.map((cat, idx) => <option key={idx} value={cat} />)}
                                            </datalist>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Área / Dependencia</label>
                                            <input type="text" name="department" required className="w-full px-3 py-2 border border-gray-300 rounded-lg text-base focus:ring-2 focus:ring-sky-500 outline-none" placeholder="Ej. Juzgado Civil Nº 1" value={formData.department} onChange={handleChange} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Teléfono / Interno</label>
                                            <input type="text" name="phone" required className="w-full px-3 py-2 border border-gray-300 rounded-lg text-base focus:ring-2 focus:ring-sky-500 outline-none" placeholder="Ej. 264 o 4209397" value={formData.phone} onChange={handleChange} />
                                        </div>
                                    </div>
                                    <div className="mt-6 flex gap-3">
                                        <button type="button" onClick={handleCloseModal} className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-medium active:bg-gray-200">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-sky-600 text-white rounded-lg font-medium active:bg-sky-700">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Confirmar Eliminación */}
                    {contactToDelete && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-gray-900 bg-opacity-50 p-4">
                            <div className="bg-white rounded-xl w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
                                <div className="mx-auto w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-4">
                                    <IconTrash className="w-6 h-6 text-red-600" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-900 mb-2">Eliminar Contacto</h3>
                                <p className="text-gray-500 mb-6 text-sm">¿Estás seguro de eliminar a <strong>{contactToDelete.name}</strong>? Esta acción no se puede deshacer.</p>
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setContactToDelete(null)} className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-medium active:bg-gray-200">Cancelar</button>
                                    <button type="button" onClick={confirmDelete} className="flex-1 py-3 bg-red-600 text-white rounded-lg font-medium active:bg-red-700">Eliminar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
